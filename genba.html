<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>現場詳細メーカー | 株式会社優心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Shippori+Mincho+B1:wght@600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #131210;
      --coal: #0e0e0c;
      --coal-2: #171613;
      --paper: #f2efe8;
      --paper-2: #e9e5da;
      --org: #ffc400;
      --org-deep: #e8b400;
      --line-d: rgba(255,255,255,0.10);
      --sans: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
      --serif: 'Shippori Mincho B1', 'Hiragino Mincho ProN', serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--sans);
      background: var(--coal);
      color: #d8d4ca;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .app-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(14,14,12,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,196,0,0.25);
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .app-title {
      font-family: var(--serif);
      font-weight: 800;
      font-size: 1.05rem;
      color: var(--paper);
      letter-spacing: 0.04em;
    }
    .app-title span { color: var(--org); }
    .app-sub { font-size: 0.65rem; color: rgba(216,212,202,0.55); letter-spacing: 0.08em; }
    .btn-new {
      background: transparent; color: var(--org);
      border: 1px solid rgba(255,196,0,0.5);
      border-radius: 8px; padding: 8px 14px;
      font-family: var(--sans); font-weight: 700; font-size: 0.8rem;
      cursor: pointer; white-space: nowrap;
    }
    .btn-new:active { background: rgba(255,196,0,0.15); }

    .wrap { max-width: 720px; margin: 0 auto; padding: 16px 16px 90px; }

    /* ---------- tabs ---------- */
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab {
      flex: 1; text-align: center; padding: 10px 0;
      border-radius: 10px; font-weight: 700; font-size: 0.88rem;
      background: var(--coal-2); color: rgba(216,212,202,0.6);
      border: 1px solid var(--line-d); cursor: pointer; user-select: none;
    }
    .tab.active { background: var(--org); color: #16130f; border-color: var(--org); }

    /* ---------- form ---------- */
    .card {
      background: var(--coal-2);
      border: 1px solid var(--line-d);
      border-radius: 14px;
      padding: 18px 16px;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 0.8rem; font-weight: 700; color: var(--org);
      letter-spacing: 0.12em; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .card h2::before { content: ""; width: 4px; height: 14px; background: var(--org); border-radius: 2px; }
    .card .hint { font-size: 0.7rem; color: rgba(216,212,202,0.5); line-height: 1.7; margin-bottom: 12px; }
    .field { margin-bottom: 13px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block; font-size: 0.72rem; font-weight: 700;
      color: rgba(216,212,202,0.75); margin-bottom: 5px; letter-spacing: 0.05em;
    }
    .field input, .field textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line-d);
      border-radius: 9px;
      padding: 11px 12px;
      color: var(--paper);
      font-family: var(--sans);
      font-size: 16px; /* prevents iOS zoom */
      outline: none;
    }
    .field input:focus, .field textarea:focus { border-color: rgba(255,196,0,0.6); }
    .field textarea { resize: vertical; min-height: 64px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ---------- import ---------- */
    .import-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-import {
      padding: 13px 8px; border-radius: 11px;
      background: rgba(255,196,0,0.1); color: var(--org);
      border: 1px dashed rgba(255,196,0,0.55);
      font-family: var(--sans); font-weight: 800; font-size: 0.85rem;
      cursor: pointer;
    }
    .btn-import:active { background: rgba(255,196,0,0.2); }
    #paste-area { margin-top: 12px; }
    #paste-area textarea { min-height: 120px; }
    #ocr-status {
      margin-top: 12px; font-size: 0.8rem; font-weight: 700; color: var(--org);
      display: flex; align-items: center; gap: 10px;
    }
    .spinner {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,196,0,0.25); border-top-color: var(--org);
      animation: spin 0.8s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- preview ---------- */
    .sheet {
      background: var(--paper);
      color: var(--ink);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.45);
    }
    .sheet-head {
      background: var(--ink);
      padding: 16px 18px 14px;
      border-bottom: 3px solid var(--org);
    }
    .sheet-badge {
      display: inline-block;
      background: var(--org); color: #16130f;
      font-size: 0.62rem; font-weight: 900; letter-spacing: 0.15em;
      padding: 3px 10px; border-radius: 999px; margin-bottom: 8px;
    }
    .sheet-title {
      font-family: var(--serif); font-weight: 800;
      font-size: 1.25rem; color: var(--paper); line-height: 1.35;
    }
    .sheet-date { color: var(--org); font-weight: 700; font-size: 0.85rem; margin-top: 5px; }
    .sheet-body { padding: 6px 18px 16px; }
    .sheet-row {
      display: flex; gap: 12px;
      padding: 11px 0;
      border-bottom: 1px dashed rgba(19,18,16,0.18);
      font-size: 0.9rem; line-height: 1.55;
    }
    .sheet-row:last-child { border-bottom: none; }
    .sheet-row .k {
      flex: 0 0 84px;
      font-size: 0.7rem; font-weight: 900; color: #8a8375;
      letter-spacing: 0.06em; padding-top: 3px;
    }
    .sheet-row .v { flex: 1; font-weight: 500; white-space: pre-wrap; word-break: break-word; }
    .sheet-row .v strong { font-weight: 900; }
    .sheet-row .v a { color: #a8760a; font-weight: 700; }
    .sheet-foot {
      background: var(--paper-2);
      padding: 10px 18px;
      font-size: 0.68rem; color: #8a8375;
      display: flex; justify-content: space-between; align-items: center;
    }
    .sheet-foot b { font-family: var(--serif); color: var(--ink); }

    /* ---------- actions ---------- */
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .btn {
      padding: 14px 10px; border-radius: 11px;
      font-family: var(--sans); font-weight: 800; font-size: 0.9rem;
      border: none; cursor: pointer; letter-spacing: 0.03em;
    }
    .btn-gold { background: var(--org); color: #16130f; grid-column: 1 / -1; }
    .btn-gold:active { background: var(--org-deep); }
    .btn-dark { background: var(--coal-2); color: var(--paper); border: 1px solid var(--line-d); }
    .btn-dark:active { background: rgba(255,255,255,0.08); }

    /* ---------- saved list ---------- */
    .saved-item {
      background: var(--coal-2);
      border: 1px solid var(--line-d);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer;
    }
    .saved-item:active { border-color: rgba(255,196,0,0.5); }
    .saved-info { flex: 1; min-width: 0; }
    .saved-name { font-weight: 700; color: var(--paper); font-size: 0.95rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .saved-meta { font-size: 0.72rem; color: rgba(216,212,202,0.55); margin-top: 3px; }
    .saved-del {
      background: transparent; border: 1px solid rgba(255,120,120,0.4);
      color: #ff9d9d; border-radius: 8px; padding: 7px 11px;
      font-size: 0.72rem; font-weight: 700; cursor: pointer; flex-shrink: 0;
    }
    .empty {
      text-align: center; padding: 48px 20px;
      color: rgba(216,212,202,0.45); font-size: 0.85rem; line-height: 1.9;
    }
    .empty .big { font-size: 2rem; display: block; margin-bottom: 8px; }

    /* ---------- toast ---------- */
    .toast {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
      background: var(--org); color: #16130f;
      font-weight: 800; font-size: 0.85rem;
      padding: 12px 22px; border-radius: 999px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 100;
      max-width: 88vw; text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .hidden { display: none !important; }
    .note { font-size: 0.68rem; color: rgba(216,212,202,0.4); text-align: center; margin-top: 18px; line-height: 1.8; }

    @media print {
      body { background: #fff; }
      .app-header, .tabs, .actions, #form-area, #import-card, .note, .toast { display: none !important; }
      .wrap { padding: 0; max-width: none; }
      .sheet { box-shadow: none; border-radius: 0; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div>
      <div class="app-title">現場詳細<span>メーカー</span></div>
      <div class="app-sub">株式会社優心｜社内用ツール</div>
    </div>
    <button class="btn-new" id="btn-new" type="button">＋ 新規作成</button>
  </header>

  <div class="wrap">
    <div class="tabs">
      <div class="tab active" id="tab-edit">作成・編集</div>
      <div class="tab" id="tab-list">保存した現場 <span id="saved-count"></span></div>
    </div>

    <!-- ============ 作成画面 ============ -->
    <div id="page-edit">
      <div class="card" id="import-card">
        <h2>画像・テキストから自動入力</h2>
        <p class="hint">FAXの画像・PDFやLINEのスクショ、もらった文面から各項目を自動で振り分けます。一度コピー・保存した業者や現場はこの端末が覚えて、次回の読み取りで担当者・電話番号・住所などを自動補完します。ファイルもデータも端末の中だけで処理され、外部には送信されません。</p>
        <div class="import-btns">
          <button class="btn-import" id="btn-ocr" type="button">📷 画像・PDFを読み取る</button>
          <button class="btn-import" id="btn-paste" type="button">📋 テキストを貼り付け</button>
        </div>
        <input type="file" id="ocr-file" accept="image/*,.pdf,application/pdf" class="hidden">
        <div id="paste-area" class="hidden">
          <div class="field" style="margin-top:12px;">
            <textarea id="paste-text" placeholder="LINEやメールでもらった現場詳細の文面を、ここにそのまま貼り付けてください"></textarea>
          </div>
          <button class="btn btn-gold" id="btn-paste-run" type="button" style="width:100%;">↓ 各項目に振り分ける</button>
        </div>
        <div id="ocr-status" class="hidden"><span class="spinner"></span><span id="ocr-status-text"></span></div>
      </div>

      <div id="form-area">
        <div class="card">
          <h2>基本情報</h2>
          <div class="row2">
            <div class="field">
              <label>日付</label>
              <input type="date" id="f-date">
            </div>
            <div class="field">
              <label>業者名</label>
              <input type="text" id="f-client" placeholder="例）ラックプラス" list="dl-client">
            </div>
          </div>
          <div class="row2">
            <div class="field">
              <label>担当者</label>
              <input type="text" id="f-contact-name" placeholder="例）渡村" list="dl-contact">
            </div>
            <div class="field">
              <label>担当者 電話番号</label>
              <input type="tel" id="f-contact-tel" placeholder="例）090-0000-0000">
            </div>
          </div>
        </div>

        <div class="card">
          <h2>現場</h2>
          <div class="field">
            <label>現場住所（〒から）</label>
            <input type="text" id="f-address" placeholder="例）〒591-8007 大阪府堺市北区奥本町２丁１１４">
          </div>
          <div class="field">
            <label>現場名</label>
            <input type="text" id="f-name" placeholder="例）奥本町共同住宅" list="dl-site">
          </div>
        </div>

        <div class="card">
          <h2>時間・集合</h2>
          <div class="row2">
            <div class="field">
              <label>開始時間</label>
              <input type="text" id="f-start" placeholder="例）13:00開始">
            </div>
            <div class="field">
              <label>集合時間</label>
              <input type="text" id="f-meet" placeholder="例）11:00に事務所集合❗️">
            </div>
          </div>
          <div class="field">
            <label>※メモ（1行ずつ）</label>
            <textarea id="f-meet-notes" placeholder="例）ミラで‼️&#10;パナソニックの用意積んで向かってください！"></textarea>
          </div>
          <div class="field">
            <label>🚨注意事項（集合・装備）</label>
            <textarea id="f-caution1"></textarea>
          </div>
        </div>

        <div class="card">
          <h2>作業</h2>
          <div class="row2">
            <div class="field">
              <label>プラン</label>
              <input type="text" id="f-plan" placeholder="例）3h">
            </div>
            <div class="field">
              <label>作業内容</label>
              <input type="text" id="f-work" placeholder="例）材料搬入" list="dl-work">
            </div>
          </div>
          <div class="field">
            <label>メンバー（1行に1名）</label>
            <textarea id="f-members" placeholder="例）大西&#10;松本"></textarea>
          </div>
          <div class="field">
            <label>🚨注意事項（作業）</label>
            <textarea id="f-caution2" style="min-height:110px;"></textarea>
          </div>
          <div class="field">
            <label>備考（あれば）</label>
            <textarea id="f-note" placeholder="その他伝えたいこと"></textarea>
          </div>
        </div>
      </div>

      <!-- プレビュー -->
      <div class="sheet" id="sheet">
        <div class="sheet-head">
          <span class="sheet-badge">現場詳細</span>
          <div class="sheet-title" id="p-name">（現場名を入力してください）</div>
          <div class="sheet-date" id="p-date"></div>
        </div>
        <div class="sheet-body" id="p-body"></div>
        <div class="sheet-foot">
          <span><b>株式会社優心</b>｜搬入・荷揚げ</span>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-gold" id="btn-copy" type="button">📋 LINE用テキストをコピー</button>
        <button class="btn btn-dark" id="btn-share" type="button">共有する</button>
        <button class="btn btn-dark" id="btn-save" type="button">保存する</button>
      </div>
      <p class="note">入力内容はこの端末（スマホ／PC）の中だけに保存されます。<br>インターネット上には送信されません。</p>
    </div>

    <!-- ============ 保存一覧 ============ -->
    <div id="page-list" class="hidden">
      <div id="saved-list"></div>
    </div>
  </div>

  <datalist id="dl-client"></datalist>
  <datalist id="dl-contact"></datalist>
  <datalist id="dl-site"></datalist>
  <datalist id="dl-work"></datalist>

  <div class="toast" id="toast"></div>

  <script>
    "use strict";
    const $ = (id) => document.getElementById(id);
    const FIELDS = ["date","client","contact-name","contact-tel","address","name","start","meet","meet-notes","caution1","plan","work","members","caution2","note"];
    const STORE_KEY = "yushin-genba-v1";
    const DEFAULT_CAUTION1 = "🚨ヘルメット着用徹底\n🚨安全靴必要\n🚨傷、破損注意\n🚨近隣配慮お願いします。";
    const DEFAULT_CAUTION2 = "🚨職置き厳禁\n🚨危険箇所確認。\n🚨長物振り回す際、注意\n🚨仮置きは、養生徹底。\n🚨近隣、第3者の配慮\n🚨付近タバコ厳禁\n🚨最後に他に揚げるものをあるか聞いて下さい。\n⚠️掃除徹底。\n⚠️破損注意\n⚠️ヘルメット着用";
    let currentId = null;

    /* ---------- data ---------- */
    const loadAll = () => {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
      catch { return []; }
    };
    const saveAll = (list) => localStorage.setItem(STORE_KEY, JSON.stringify(list));

    const readForm = () => {
      const d = {};
      FIELDS.forEach(f => d[f] = $("f-" + f).value.trim());
      return d;
    };
    const writeForm = (d) => {
      FIELDS.forEach(f => $("f-" + f).value = (d && d[f]) || "");
      if (!d) {
        $("f-caution1").value = DEFAULT_CAUTION1;
        $("f-caution2").value = DEFAULT_CAUTION2;
      }
      render();
    };

    /* ---------- helpers ---------- */
    const WEEK = ["日","月","火","水","木","金","土"];
    const fmtDateShort = (iso) => {
      if (!iso) return "";
      const [y, m, day] = iso.split("-").map(Number);
      return `${m}/${day} ${WEEK[new Date(y, m - 1, day).getDay()]}曜日`;
    };
    const mapUrl = (addr) => "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(addr.replace(/〒?\d{3}-?\d{4}\s*/, ""));
    const esc = (s) => s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    const withSama = (s) => s ? (/様\s*$/.test(s) ? s : s + " 様") : "";
    const memberList = (s) => s.split(/\r?\n/).map(x => x.trim()).filter(Boolean);
    const starLines = (s) => s.split(/\r?\n/).map(x => x.trim()).filter(Boolean).map(x => /^[※]/.test(x) ? x : "※" + x);

    /* ---------- preview ---------- */
    const render = () => {
      const d = readForm();
      $("p-name").textContent = d.name || d.client || "（現場名を入力してください）";
      $("p-date").textContent = fmtDateShort(d.date);

      const rows = [];
      const add = (k, vHtml) => { if (vHtml) rows.push(`<div class="sheet-row"><div class="k">${k}</div><div class="v">${vHtml}</div></div>`); };

      add("業者名", d.client && `<strong>${esc(withSama(d.client))}</strong>`);
      const contact = [d["contact-name"] && esc(withSama(d["contact-name"])), d["contact-tel"] && `<a href="tel:${esc(d["contact-tel"])}">${esc(d["contact-tel"])}</a>`].filter(Boolean).join("<br>");
      add("担当者", contact);
      add("現場住所", d.address && `${esc(d.address)}<br><a href="${mapUrl(d.address)}" target="_blank" rel="noopener">📍 地図を開く</a>`);
      add("開始時間", d.start && `<strong>${esc(d.start)}</strong>`);
      const meet = [d.meet && `<strong>${esc(d.meet)}</strong>`, ...starLines(d["meet-notes"]).map(esc)].filter(Boolean).join("<br>");
      add("集合", meet);
      add("注意事項", d.caution1 && esc(d.caution1));
      add("プラン", d.plan && `<strong>${esc(d.plan)}</strong>`);
      const mem = memberList(d.members);
      add("メンバー", mem.length ? esc(mem.join("\n")) + `<br><strong>計${mem.length}名</strong>` : "");
      add("作業内容", d.work && `<strong>${esc(d.work)}</strong>`);
      add("作業注意", d.caution2 && esc(d.caution2));
      add("備考", d.note && esc(d.note));

      $("p-body").innerHTML = rows.join("") || `<div class="sheet-row"><div class="v" style="color:#8a8375;">上のフォームに入力すると、ここに現場詳細が表示されます。</div></div>`;
    };

    /* ---------- LINE text ---------- */
    const buildText = () => {
      const d = readForm();
      const B = [];
      if (d.date) B.push(fmtDateShort(d.date));
      if (d.client) B.push("業者名  " + withSama(d.client));
      const contact = ["担当者", d["contact-name"] && withSama(d["contact-name"]), d["contact-tel"]].filter(Boolean);
      if (contact.length > 1) B.push(contact.join("\n"));
      if (d.address) B.push("現場住所\n" + d.address);
      if (d.name) B.push(d.name);

      const timeL = [];
      if (d.start) timeL.push("開始時間 " + d.start);
      if (d.meet) timeL.push("集合時間 " + d.meet);
      timeL.push(...starLines(d["meet-notes"]));
      if (timeL.length) B.push(timeL.join("\n"));

      if (d.caution1) B.push(d.caution1);
      if (d.plan) B.push("プラン " + d.plan);

      const mem = memberList(d.members);
      if (mem.length) B.push("メンバー\n" + mem.join("\n") + "\n\n計" + mem.length + "名");

      if (d.work) B.push("作業内容\n" + d.work);
      if (d.caution2) B.push(d.caution2);
      if (d.note) B.push(d.note);
      if (d.address) B.push("📍現場の地図（タップで開く）\n" + mapUrl(d.address));
      B.push("よろしくお願いいたします！");
      return B.join("\n\n");
    };

    /* ---------- text parser (paste / OCR) ---------- */
    const parseGenbaText = (raw) => {
      // OCRは日本語を「株 式 会 社」のように空白区切りで出すため、日本語文字間の空白を除去して解析
      const compactJa = (s) => s.replace(/([^\x00-\x7F]) +(?=[^\x00-\x7F])/g, "$1");
      raw = raw.split(/\r?\n/).map(l => compactJa(l.trim())).join("\n");
      const lines = raw.split(/\n/);
      const d = {};
      const isLabel = (l) => /^(業者名|担当者|現場住所|開始時間|集合時間|プラン|メンバー|作業内容|計\s*\d+\s*名|よろしく)/.test(l);
      const nextValue = (i) => {
        for (let j = i + 1; j < lines.length; j++) {
          if (!lines[j]) continue;
          if (isLabel(lines[j])) return "";
          return lines[j];
        }
        return "";
      };
      const afterLabel = (line, label) => line.replace(new RegExp("^" + label + "[\\s:：]*"), "").trim();

      // 日付（例: 7/21 火曜日）
      for (const l of lines) {
        const m = l.match(/^(\d{1,2})[\/月](\d{1,2})/);
        if (m) {
          const now = new Date();
          let y = now.getFullYear();
          const mo = +m[1], da = +m[2];
          if (mo < now.getMonth() - 5) y++; // 年末に翌年の日付を入れた場合
          d.date = `${y}-${String(mo).padStart(2, "0")}-${String(da).padStart(2, "0")}`;
          break;
        }
      }

      // 電話番号
      const tel = raw.match(/0\d{1,3}[-‐ー−]\d{1,4}[-‐ー−]\d{3,4}|0\d{9,10}/);
      if (tel) d["contact-tel"] = tel[0].replace(/[‐ー−]/g, "-");

      const memberLines = [];
      let memberMode = false;

      lines.forEach((l, i) => {
        if (!l) { return; }
        if (memberMode) {
          if (/^計\s*\d+\s*名/.test(l) || isLabel(l) || /^[🚨⚠️※]/u.test(l)) { memberMode = false; }
          else { memberLines.push(l); return; }
        }
        if (/^業者名/.test(l)) {
          d.client = (afterLabel(l, "業者名") || nextValue(i)).replace(/様\s*$/, "").trim();
        } else if (/^担当者/.test(l)) {
          const v = afterLabel(l, "担当者") || nextValue(i);
          if (v && !/^0\d/.test(v)) d["contact-name"] = v.replace(/様\s*$/, "").trim();
        } else if (/^現場住所/.test(l)) {
          const v = afterLabel(l, "現場住所") || nextValue(i);
          d.address = v;
          // 住所の次の行が現場名のことが多い
          const idx = lines.indexOf(v, i);
          if (idx >= 0) {
            const nv = nextValue(idx);
            if (nv && !isLabel(nv) && !/^[🚨⚠️※]/u.test(nv) && !/^0\d/.test(nv)) d.name = nv;
          }
        } else if (/^開始時間/.test(l)) {
          d.start = afterLabel(l, "開始時間") || nextValue(i);
        } else if (/^集合時間/.test(l)) {
          d.meet = afterLabel(l, "集合時間") || nextValue(i);
        } else if (/^プラン/.test(l)) {
          d.plan = afterLabel(l, "プラン") || nextValue(i);
        } else if (/^メンバー/.test(l)) {
          memberMode = true;
        } else if (/^作業内容/.test(l)) {
          d.work = afterLabel(l, "作業内容") || nextValue(i);
        }
      });
      if (memberLines.length) d.members = memberLines.join("\n");

      // 〒住所（ラベルなしで書かれている場合）。〒か都道府県表記がある行のみ対象
      if (!d.address) {
        const m = raw.match(/〒\s*\d{3}[-−]?\d{4}[^\n]*/);
        if (m) d.address = m[0].trim();
        else {
          const line = lines.find(l => /(都|道|府|県)[^\n]{0,15}(市|区|郡|町|村)/.test(l) && /[0-9０-９]/.test(l) && !isLabel(l));
          if (line) d.address = line;
        }
      }

      // ---- FAX等の自由書式向け（ラベルで見つからなかった項目のみ）----
      const isOurs = (s) => /優心/.test(s);
      // 業者名・担当者：「小浜木材工業株式会社 高橋」形式。会社名を含む最初の行を採用
      // （FAXは重要情報が上部に書かれ、地図等のゴミ文字は後方に出るため、上から順で正解しやすい）
      if (!d.client) {
        for (const l of lines) {
          if (!l || /御中/.test(l)) continue;
          const m = l.match(/([一-龥々ァ-ヶーA-Za-z0-9]{0,12})(株式会社|有限会社)([一-龥々ァ-ヶー]{0,10})/);
          if (m && !isOurs(m[0])) {
            if (m[1]) {
              // 前置き型（◯◯株式会社）：後ろに続く漢字は担当者名の可能性が高い
              d.client = m[1] + m[2];
              if (!d["contact-name"] && m[3] && m[3].length <= 4) d["contact-name"] = m[3];
            } else {
              // 後置き型（株式会社◯◯）
              d.client = m[2] + m[3];
            }
            break;
          }
        }
      }
      // 現場名：「現場名：◯◯」「（現場名・◯◯」表記
      if (!d.name) {
        const m = raw.match(/現場名\s*[：:・.、]?\s*([^\n)）]+)/);
        if (m) d.name = m[1].trim();
      }
      // 開始時間：「13時半」「13時30分」「13:30」など（時刻の話をしている行のみ）
      if (!d.start) {
        for (const l of lines) {
          if (!/(時|開始|集合)/.test(l)) continue;
          const m = l.match(/\d{1,2}[:：]\d{2}|\d{1,2}\s*時\s*半|\d{1,2}\s*時(?:\d{1,2}分)?/);
          if (m) { d.start = m[0].replace(/\s+/g, "") + (/開始/.test(l) || !/集合/.test(l) ? "開始" : ""); break; }
        }
      }
      // 作業内容：「フロア搬入」「PB搬入」など（扱入・般入はOCRの誤読補正）
      if (!d.work) {
        const m = raw.match(/[^\s、。;:：（()）]*(?:搬入|扱入|般入|搬出|荷揚げ|荷上げ|揚重)/);
        if (m && !/現場/.test(m[0])) d.work = m[0].replace(/[扱般]入/, "搬入").replace(/^\d*名/, "");
      }
      // 人数：「1名」→ 備考へメモ（メンバー名は不明のため）
      if (!d.members && !d.note) {
        const m = raw.match(/(\d{1,2})\s*名/);
        if (m) d.note = "人数：" + m[1] + "名";
      }

      // ※メモ、🚨⚠️注意事項（プラン/メンバーより前→集合側、後→作業側）
      const planIdx = lines.findIndex(l => /^(プラン|メンバー|作業内容)/.test(l));
      const notes = [], c1 = [], c2 = [];
      lines.forEach((l, i) => {
        if (/^※/.test(l)) notes.push(l.replace(/^※/, ""));
        else if (/^[🚨⚠️]/u.test(l)) ((planIdx < 0 || i < planIdx) ? c1 : c2).push(l);
      });
      if (notes.length) d["meet-notes"] = notes.join("\n");
      if (c1.length) d.caution1 = c1.join("\n");
      if (c2.length) d.caution2 = c2.join("\n");

      if (d.address) d.address = d.address.replace(/\s+/g, "");
      return d;
    };

    /* ---------- 学習（送った業者・現場を端末内に記憶して次回補完） ---------- */
    const LEARN_KEY = "yushin-genba-learn-v1";
    const loadLearn = () => {
      try {
        const L = JSON.parse(localStorage.getItem(LEARN_KEY)) || {};
        return { vendors: L.vendors || {}, sites: L.sites || {}, works: L.works || {} };
      } catch { return { vendors: {}, sites: {}, works: {} }; }
    };
    const saveLearn = (L) => localStorage.setItem(LEARN_KEY, JSON.stringify(L));
    const normName = (s) => (s || "").replace(/株式会社|有限会社|\s/g, "");

    const bigrams = (s) => { const set = new Set(); for (let i = 0; i < s.length - 1; i++) set.add(s.slice(i, i + 2)); return set; };
    const similarity = (a, b) => {
      if (!a || !b) return 0;
      if (a === b) return 1;
      if (a.length >= 2 && b.length >= 2 && (a.includes(b) || b.includes(a))) return 0.9;
      const A = bigrams(a), B = bigrams(b);
      if (!A.size || !B.size) return 0;
      let hit = 0;
      A.forEach(g => { if (B.has(g)) hit++; });
      return 2 * hit / (A.size + B.size);
    };

    const learnCurrent = () => {
      const d = readForm();
      const L = loadLearn();
      if (d.client) {
        const k = normName(d.client);
        const old = L.vendors[k] || {};
        L.vendors[k] = { client: d.client, contact: d["contact-name"] || old.contact || "", tel: d["contact-tel"] || old.tel || "", t: Date.now() };
      }
      if (d.name) {
        const k = normName(d.name);
        const old = L.sites[k] || {};
        L.sites[k] = { name: d.name, address: d.address || old.address || "", t: Date.now() };
      }
      if (d.work) L.works[d.work] = { v: d.work, t: Date.now() };
      // 上限（古いものから削除）
      ["vendors", "sites", "works"].forEach(g => {
        const keys = Object.keys(L[g]);
        if (keys.length > 300) keys.sort((a, b) => L[g][a].t - L[g][b].t).slice(0, keys.length - 300).forEach(k => delete L[g][k]);
      });
      saveLearn(L);
      refreshDatalists();
    };

    const bestMatch = (dict, key, getName) => {
      let best = null, bs = 0;
      Object.values(dict).forEach(v => {
        const s = similarity(key, normName(getName(v)));
        if (s > bs) { bs = s; best = v; }
      });
      return bs >= 0.55 ? best : null;
    };

    // 読み取り結果を過去の記憶で補完（欠けを埋め、OCRの読み間違いを直す）
    const enrichFromMemory = () => {
      const L = loadLearn();
      let filled = 0;
      const cl = $("f-client").value.trim();
      if (cl) {
        const v = bestMatch(L.vendors, normName(cl), x => x.client);
        if (v) {
          if (v.client !== cl) { $("f-client").value = v.client; filled++; }
          if (!$("f-contact-name").value.trim() && v.contact) { $("f-contact-name").value = v.contact; filled++; }
          if (!$("f-contact-tel").value.trim() && v.tel) { $("f-contact-tel").value = v.tel; filled++; }
        }
      }
      const nm = $("f-name").value.trim();
      if (nm) {
        const s = bestMatch(L.sites, normName(nm), x => x.name);
        if (s) {
          if (s.name.length > nm.length) { $("f-name").value = s.name; filled++; }
          if (!$("f-address").value.trim() && s.address) { $("f-address").value = s.address; filled++; }
        }
      }
      return filled;
    };

    const refreshDatalists = () => {
      const L = loadLearn();
      const fill = (id, arr) => { $(id).innerHTML = [...new Set(arr.filter(Boolean))].map(v => `<option value="${esc(v)}">`).join(""); };
      const byT = (o, f) => Object.values(o).sort((a, b) => b.t - a.t).map(f);
      fill("dl-client", byT(L.vendors, v => v.client));
      fill("dl-contact", byT(L.vendors, v => v.contact));
      fill("dl-site", byT(L.sites, v => v.name));
      fill("dl-work", byT(L.works, v => v.v));
    };

    const applyParsed = (d) => {
      let count = 0;
      FIELDS.forEach(f => { if (d[f]) { $("f-" + f).value = d[f]; count++; } });
      const extra = enrichFromMemory();
      render();
      return { n: count, e: extra };
    };

    /* ---------- paste ---------- */
    $("btn-paste").addEventListener("click", () => {
      $("paste-area").classList.toggle("hidden");
    });
    $("btn-paste-run").addEventListener("click", () => {
      const raw = $("paste-text").value.trim();
      if (!raw) { toast("先に文面を貼り付けてください"); return; }
      const r = applyParsed(parseGenbaText(raw));
      if (r.n) {
        $("paste-area").classList.add("hidden");
        $("paste-text").value = "";
        toast(`${r.n}項目を振り分けました${r.e ? `（過去のデータで${r.e}項目を補完）` : ""}。内容を確認してください`);
      } else {
        toast("振り分けできる項目が見つかりませんでした");
      }
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    /* ---------- OCR ---------- */
    const setOcrStatus = (msg) => {
      $("ocr-status").classList.toggle("hidden", !msg);
      $("ocr-status-text").textContent = msg || "";
    };
    const loadTesseract = () => new Promise((resolve, reject) => {
      if (window.Tesseract) return resolve();
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js";
      s.onload = resolve;
      s.onerror = () => reject(new Error("script"));
      document.head.appendChild(s);
    });

    const loadPdfJs = () => new Promise((resolve, reject) => {
      if (window.pdfjsLib) return resolve();
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js";
      s.onload = () => {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
        resolve();
      };
      s.onerror = () => reject(new Error("script"));
      document.head.appendChild(s);
    });

    // 文字データ入りPDF：テキストを行単位に組み立てて抽出
    const pdfExtractText = async (pdf) => {
      const out = [];
      const pages = Math.min(pdf.numPages, 5);
      for (let p = 1; p <= pages; p++) {
        const page = await pdf.getPage(p);
        const tc = await page.getTextContent();
        const lines = new Map();
        tc.items.forEach(it => {
          if (!it.str || !it.str.trim()) return;
          const y = it.transform[5];
          let key = null;
          for (const k of lines.keys()) { if (Math.abs(k - y) <= 3) { key = k; break; } }
          if (key === null) { key = y; lines.set(key, []); }
          lines.get(key).push({ x: it.transform[4], s: it.str });
        });
        const sorted = [...lines.entries()].sort((a, b) => b[0] - a[0])
          .map(([, items]) => items.sort((a, b) => a.x - b.x).map(i => i.s).join(" ")
            .replace(/([^\x00-\x7F]) +/g, "$1").replace(/ +([^\x00-\x7F])/g, "$1"));
        out.push(sorted.join("\n"));
      }
      return out.join("\n");
    };

    // スキャンPDF：ページを高解像度画像に変換（OCR用）
    const pdfToCanvases = async (pdf) => {
      const canvases = [];
      const pages = Math.min(pdf.numPages, 3);
      for (let p = 1; p <= pages; p++) {
        const page = await pdf.getPage(p);
        const vp1 = page.getViewport({ scale: 1 });
        const scale = Math.min(2.5, 1800 / vp1.width);
        const vp = page.getViewport({ scale });
        const canvas = document.createElement("canvas");
        canvas.width = vp.width;
        canvas.height = vp.height;
        await page.render({ canvasContext: canvas.getContext("2d"), viewport: vp }).promise;
        canvases.push(canvas);
      }
      return canvases;
    };

    // FAX等の粗い画像向け前処理：グレースケール化＋コントラスト補正
    const preprocessCanvas = (canvas) => {
      const ctx = canvas.getContext("2d");
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const a = img.data;
      let min = 255, max = 0;
      for (let i = 0; i < a.length; i += 4) {
        const g = (a[i] * 0.299 + a[i + 1] * 0.587 + a[i + 2] * 0.114) | 0;
        a[i] = a[i + 1] = a[i + 2] = g;
        if (g < min) min = g;
        if (g > max) max = g;
      }
      const range = Math.max(1, max - min);
      for (let i = 0; i < a.length; i += 4) {
        const g = (a[i] - min) * 255 / range;
        const v = g < 140 ? g * 0.75 : Math.min(255, g * 1.15);
        a[i] = a[i + 1] = a[i + 2] = v;
      }
      ctx.putImageData(img, 0, 0);
      return canvas;
    };

    // 画像ファイル→OCR向けキャンバス（小さい画像は拡大して認識率を上げる）
    const imageToCanvas = (file) => new Promise((resolve, reject) => {
      const url = URL.createObjectURL(file);
      const im = new Image();
      im.onload = () => {
        URL.revokeObjectURL(url);
        const scale = Math.min(3, Math.max(1, 1800 / Math.max(im.width, 1)));
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(im.width * scale);
        canvas.height = Math.round(im.height * scale);
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.drawImage(im, 0, 0, canvas.width, canvas.height);
        resolve(preprocessCanvas(canvas));
      };
      im.onerror = () => { URL.revokeObjectURL(url); reject(new Error("image")); };
      im.src = url;
    });

    const ocrSources = async (sources) => {
      setOcrStatus("読み取り準備中…（初回は少し時間がかかります）");
      await loadTesseract();
      const total = sources.length;
      let pageNo = 1;
      const worker = await Tesseract.createWorker("jpn", 1, {
        logger: (m) => {
          if (m.status === "recognizing text") {
            const pageInfo = total > 1 ? `${pageNo}/${total}ページ目 ` : "";
            setOcrStatus(`${pageInfo}文字を読み取り中… ${Math.round(m.progress * 100)}%`);
          }
        }
      });
      let text = "";
      for (const src of sources) {
        const { data } = await worker.recognize(src);
        text += (data.text || "") + "\n";
        pageNo++;
      }
      await worker.terminate();
      return text;
    };

    const countParsed = (text) => {
      const d = parseGenbaText(text);
      return { d, n: Object.keys(d).filter(k => d[k]).length };
    };

    const finishWithText = (rawText, fromOcr) => {
      const text = (rawText || "").replace(/[ \t]+/g, " ").trim();
      if (!text) { toast("文字を読み取れませんでした"); return; }
      const r = applyParsed(parseGenbaText(text));
      if (fromOcr) {
        // 読み取った生テキストを残して、確認・手直しできるようにする
        $("paste-text").value = text;
      }
      if (r.n >= 3) {
        toast(`${r.n}項目を読み取りました${r.e ? `（過去のデータで${r.e}項目を補完）` : ""}。必ず内容を確認してください`);
        if (fromOcr) $("paste-area").classList.add("hidden");
      } else {
        $("paste-area").classList.remove("hidden");
        if (!fromOcr) $("paste-text").value = text;
        toast(r.n ? `${r.n}項目だけ読み取れました。読取結果を貼り付け欄で確認・手直しできます` : "自動振り分けできなかったため、読取結果を貼り付け欄に入れました");
      }
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    $("btn-ocr").addEventListener("click", () => $("ocr-file").click());
    $("ocr-file").addEventListener("change", async (e) => {
      const file = e.target.files && e.target.files[0];
      e.target.value = "";
      if (!file) return;
      const isPdf = file.type === "application/pdf" || /\.pdf$/i.test(file.name);
      try {
        let text, fromOcr;
        if (isPdf) {
          setOcrStatus("PDFを開いています…");
          await loadPdfJs();
          const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
          const layerText = await pdfExtractText(pdf);
          text = layerText;
          fromOcr = false;
          // 文字データが乏しい（スキャンPDF・FAX等）→ 画像化してOCRし、良い方を採用
          if (countParsed(layerText).n < 3) {
            setOcrStatus("スキャンPDFのため文字認識に切り替えます…");
            const canvases = (await pdfToCanvases(pdf)).map(preprocessCanvas);
            const ocrText = await ocrSources(canvases);
            if (countParsed(ocrText).n >= countParsed(layerText).n) { text = ocrText; fromOcr = true; }
          }
        } else {
          text = await ocrSources([await imageToCanvas(file)]);
          fromOcr = true;
        }
        setOcrStatus("");
        finishWithText(text, fromOcr);
      } catch (err) {
        setOcrStatus("");
        toast("読み取りに失敗しました。テキスト貼り付けをお試しください");
      }
    });

    /* ---------- toast ---------- */
    let toastTimer;
    const toast = (msg) => {
      const t = $("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
    };

    /* ---------- actions ---------- */
    $("btn-copy").addEventListener("click", async () => {
      learnCurrent();
      const text = buildText();
      try {
        await navigator.clipboard.writeText(text);
        toast("コピーしました！LINEに貼り付けてください");
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        toast("コピーしました！LINEに貼り付けてください");
      }
    });

    $("btn-share").addEventListener("click", async () => {
      learnCurrent();
      const text = buildText();
      if (navigator.share) {
        try { await navigator.share({ text }); } catch {}
      } else {
        await navigator.clipboard.writeText(text).catch(() => {});
        toast("この端末は共有非対応のためコピーしました");
      }
    });

    $("btn-save").addEventListener("click", () => {
      const d = readForm();
      if (!d.name && !d.client) { toast("現場名か業者名を入力してください"); $("f-name").focus(); return; }
      learnCurrent();
      const list = loadAll();
      if (currentId) {
        const i = list.findIndex(x => x.id === currentId);
        if (i >= 0) { list[i] = { ...list[i], ...d, updated: new Date().toISOString() }; }
        else { currentId = null; }
      }
      if (!currentId) {
        currentId = "g" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
        list.unshift({ id: currentId, ...d, updated: new Date().toISOString() });
      }
      saveAll(list);
      renderList();
      toast("保存しました");
    });

    $("btn-new").addEventListener("click", () => {
      currentId = null;
      writeForm(null);
      showPage("edit");
      window.scrollTo({ top: 0 });
    });

    /* ---------- saved list ---------- */
    const renderList = () => {
      const list = loadAll();
      $("saved-count").textContent = list.length ? `(${list.length})` : "";
      const box = $("saved-list");
      if (!list.length) {
        box.innerHTML = `<div class="empty"><span class="big">📂</span>保存した現場はまだありません。<br>「作成・編集」で入力して「保存する」を押すと<br>ここに一覧表示されます。</div>`;
        return;
      }
      box.innerHTML = list.map(g => {
        const meta = [fmtDateShort(g.date), g.start, g.client && withSama(g.client)].filter(Boolean).join("　");
        return `<div class="saved-item" data-id="${g.id}">
          <div class="saved-info">
            <div class="saved-name">${esc(g.name || g.client || "（無題）")}</div>
            <div class="saved-meta">${esc(meta) || "詳細未入力"}</div>
          </div>
          <button class="saved-del" data-del="${g.id}" type="button">削除</button>
        </div>`;
      }).join("");
    };

    $("saved-list").addEventListener("click", (e) => {
      const delId = e.target.getAttribute("data-del");
      if (delId) {
        if (confirm("この現場を削除しますか？")) {
          saveAll(loadAll().filter(x => x.id !== delId));
          if (currentId === delId) currentId = null;
          renderList();
          toast("削除しました");
        }
        return;
      }
      const item = e.target.closest(".saved-item");
      if (!item) return;
      const g = loadAll().find(x => x.id === item.getAttribute("data-id"));
      if (!g) return;
      currentId = g.id;
      writeForm(g);
      showPage("edit");
      window.scrollTo({ top: 0 });
      toast("読み込みました");
    });

    /* ---------- tabs ---------- */
    const showPage = (which) => {
      $("page-edit").classList.toggle("hidden", which !== "edit");
      $("page-list").classList.toggle("hidden", which !== "list");
      $("tab-edit").classList.toggle("active", which === "edit");
      $("tab-list").classList.toggle("active", which === "list");
    };
    $("tab-edit").addEventListener("click", () => showPage("edit"));
    $("tab-list").addEventListener("click", () => { renderList(); showPage("list"); });

    /* ---------- init ---------- */
    FIELDS.forEach(f => $("f-" + f).addEventListener("input", render));
    $("f-caution1").value = DEFAULT_CAUTION1;
    $("f-caution2").value = DEFAULT_CAUTION2;
    render();
    renderList();
    refreshDatalists();
  </script>
</body>
</html>
